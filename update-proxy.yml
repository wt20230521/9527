name: Update Proxy List

on:
  schedule:
    - cron: '0 */6 * * *'  # 每6小时运行一次 (UTC时间)
  workflow_dispatch:  # 允许手动触发

jobs:
  update-proxy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install requests beautifulsoup4

    - name: Run proxy fetcher
      run: |
        python proxy_fetcher.py

    - name: Check if file changed
      id: check
      run: |
        if git diff --quiet proxies_valid_node.txt; then
          echo "changed=false" >> $GITHUB_OUTPUT
        else
          echo "changed=true" >> $GITHUB_OUTPUT
        fi

    - name: Commit and push if changed
      if: steps.check.outputs.changed == 'true'
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add proxies_valid_node.txt
        git commit -m "Update proxy list - $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
        git push
